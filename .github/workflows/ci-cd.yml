name: CI/CD

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (python checks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Syntax check (compileall)
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q authserver/root backend/root frontend/root tgserver tgbot

      - name: Install backend dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -r backend/requirements.txt

      - name: Run backend tests
        shell: bash
        working-directory: backend/root
        env:
          SECRET_KEY: ci-not-a-secret
          DEBUG: "true"
          DJANGO_ALLOWED_HOSTS: "[]"
          CORS_ALLOWED_ORIGINS: "[]"
          CORS_ALLOW_CREDENTIALS: "false"
          PROJECT_HOSTS: "[]"
          ACCESS_TOKEN_LIFETIME: "5"
          REFRESH_TOKEN_LIFETIME: "60"
        run: |
          set -euo pipefail
          python manage.py test

  deploy:
    name: Deploy (SSH -> docker compose)
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            export DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}'
            if [ -z "$DEPLOY_PATH" ]; then export DEPLOY_PATH="/var/www/Diary-project/Diary2.0"; fi
            export DEPLOY_BRANCH='${{ secrets.DEPLOY_BRANCH }}'
            if [ -z "$DEPLOY_BRANCH" ]; then export DEPLOY_BRANCH="master"; fi
            bash "$DEPLOY_PATH/.github/deploy_ssh.sh"
