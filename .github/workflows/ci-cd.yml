name: CI/CD

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (python checks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Syntax check (compileall)
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q authserver/root backend/root frontend/root tgserver tgbot

      - name: Install backend dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -r backend/requirements.txt

      - name: Run backend tests
        shell: bash
        working-directory: backend/root
        env:
          SECRET_KEY: ci-not-a-secret
          DEBUG: "true"
          DJANGO_ALLOWED_HOSTS: "[]"
          CORS_ALLOWED_ORIGINS: "[]"
          CORS_ALLOW_CREDENTIALS: "false"
          PROJECT_HOSTS: "[]"
          ACCESS_TOKEN_LIFETIME: "5"
          REFRESH_TOKEN_LIFETIME: "60"
        run: |
          set -euo pipefail
          python manage.py test

  deploy:
    name: Deploy (SSH -> docker compose)
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          PORT="${{ secrets.SSH_PORT }}"
          if [[ -z "$PORT" ]]; then PORT="22"; fi
          ssh-keyscan -p "$PORT" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Run remote deploy script
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          ssh -p "$PORT" "${SSH_USER}@${SSH_HOST}" "export DEPLOY_PATH='${DEPLOY_PATH}'; export DEPLOY_BRANCH='${DEPLOY_BRANCH}'; bash '${DEPLOY_PATH}/.github/deploy_ssh.sh'"
