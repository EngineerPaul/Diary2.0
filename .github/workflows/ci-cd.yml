name: CI/CD

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (python checks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Validate Docker Compose configs
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yaml config --quiet
          docker compose -f docker-compose.yaml -f docker-compose.prod.yaml config --quiet
          docker compose -p diary-tests -f docker-compose.yaml -f docker-compose.test.yaml config --quiet

      - name: Syntax check (compileall)
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q authserver/root backend/root frontend/root tgserver tgbot

      - name: Install backend dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -r backend/requirements.txt

      - name: Install authserver dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -r authserver/requirements.txt

      - name: Install frontend dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -r frontend/requirements.txt

      - name: Install tgserver dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -r tgserver/requirements.txt

      - name: Install tgbot dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -r tgbot/requirements.txt

      - name: Run backend tests
        shell: bash
        working-directory: backend/root
        env:
          SERVICE_NAME: backend
          LOG_LEVEL: INFO
          SECRET_KEY: ci-fake-django-secret-key-for-unit-tests-only-not-for-production
          INTERNAL_SERVICE_TOKEN: ci-internal-service-token
          DEBUG: "true"
          DJANGO_ALLOWED_HOSTS: "[]"
          CORS_ALLOWED_ORIGINS: "[]"
          CORS_ALLOW_CREDENTIALS: "false"
          PROJECT_HOSTS: "[]"
          ACCESS_TOKEN_LIFETIME: "5"
          REFRESH_TOKEN_LIFETIME: "60"
        run: |
          set -euo pipefail
          python manage.py test

      - name: Run authserver tests
        shell: bash
        working-directory: authserver
        env:
          SERVICE_NAME: authserver
          LOG_LEVEL: INFO
          SECRET_KEY: ci-fake-django-secret-key-for-unit-tests-only-not-for-production
          INTERNAL_SERVICE_TOKEN: ci-internal-service-token
          DEBUG: "true"
          SSL: "false"
          DJANGO_ALLOWED_HOSTS: "[]"
          CORS_ALLOWED_ORIGINS: "[]"
          CORS_ALLOW_CREDENTIALS: "false"
          PROJECT_HOSTS: "[]"
          ACCESS_TOKEN_LIFETIME: "5"
          REFRESH_TOKEN_LIFETIME: "60"
        run: |
          set -euo pipefail
          pytest

      - name: Run frontend tests
        shell: bash
        working-directory: frontend
        env:
          SERVICE_NAME: frontend
          LOG_LEVEL: INFO
          SECRET_KEY: ci-fake-django-secret-key-for-unit-tests-only-not-for-production
          DEBUG: "true"
          SSL: "false"
          SINGLE_USER: "false"
          DJANGO_ALLOWED_HOSTS: '["testserver"]'
          PROJECT_HOSTS: '{"frontend": "http://testserver/", "auth_server": "http://authserver:8000/", "backend": "http://back:8000/"}'
          ACCESS_TOKEN_LIFETIME: "5"
          REFRESH_TOKEN_LIFETIME: "60"
        run: |
          set -euo pipefail
          pytest

      - name: Run tgserver tests
        shell: bash
        working-directory: tgserver
        env:
          SERVICE_NAME: tgserver
          LOG_LEVEL: INFO
          TGTOKEN: "123456789:ci-tg-token-for-tests"
          MY_TG_ID: "1"
          REDIS_WORKS: "false"
          REDIS_HOST: redis
          REDIS_PORT: "6379"
          REDIS_USER: redisuser
          REDIS_USER_PASSWORD: redis-password
          INTERNAL_SERVICE_TOKEN: ci-internal-service-token
          DEBUG: "true"
          PROJECT_HOSTS: '{"backend":"http://back:8000/","auth_server":"http://authserver:8000/","tg_server":"http://botapi:8000/"}'
        run: |
          set -euo pipefail
          pytest

      - name: Run tgbot tests
        shell: bash
        working-directory: tgbot
        env:
          SERVICE_NAME: tgbot
          LOG_LEVEL: INFO
          TOKEN: "123456789:ci-tg-token-for-tests"
          ID: "1"
          SITELINK: "https://example.test/diary"
          DEBUG: "true"
          PROJECT_HOSTS: '{"backend":"http://back:8000/","auth_server":"http://authserver:8000/","tg_server":"http://botapi:8000/"}'
        run: |
          set -euo pipefail
          pytest

  deploy:
    name: Deploy (SSH -> docker compose)
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            export DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}'
            if [ -z "$DEPLOY_PATH" ]; then export DEPLOY_PATH="/var/www/Diary-project/Diary2.0"; fi
            export DEPLOY_BRANCH='${{ secrets.DEPLOY_BRANCH }}'
            if [ -z "$DEPLOY_BRANCH" ]; then export DEPLOY_BRANCH="master"; fi
            cd "$DEPLOY_PATH"
            git fetch --prune origin
            git reset --hard "origin/${DEPLOY_BRANCH}"
            bash ".github/deploy_ssh.sh"
