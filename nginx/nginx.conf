events {
    worker_connections 1024;
    multi_accept on;  # принять несколько соединений за один вызов accept (меньше системных вызовов при всплесках)
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;  # не отдавать версию nginx в заголовке Server и на страницах ошибок

    # именованный формат access-лога (поля для разбора и мониторинга)
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main buffer=16k flush=5s;  # буфер 16k; сброс на диск каждые 5s или при заполнении — меньше дисковой нагрузки
    error_log /var/log/nginx/error.log warn;  # в error-лог писать от уровня warn и выше (меньше шума, чем info)

    # зона для limit_req: ключ — IP, 10 МБ памяти под состояние, средняя скорость 20 запросов/с на IP
    limit_req_zone $binary_remote_addr zone=req_limit_per_ip:10m rate=20r/s;
    # отдельная зона для /auth/: жёстче (5 r/s) — усложняет перебор логина/пароля
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    # зона для limit_conn: сколько одновременных соединений считать с одного IP
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

    sendfile on;
    tcp_nopush on;  # накапливать ответ в буфере и отправлять крупными пакетами (обычно выгодно с sendfile)
    keepalive_timeout 65;

    gzip on;  # сжимать ответы при поддержке клиентом Accept-Encoding: gzip
    gzip_vary on;  # добавить Vary: Accept-Encoding (корректное кэширование на промежуточных прокси/CDN)
    gzip_comp_level 5;  # баланс CPU / степень сжатия (1–9)
    gzip_min_length 256;  # не тратить CPU на слишком короткие тела ответа
    gzip_proxied any;  # разрешить сжатие ответов, полученных от upstream (прокси), не только с диска
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript image/svg+xml;  # MIME-типы, для которых gzip имеет смысл

    include /etc/nginx/conf.d/*.conf;
}
