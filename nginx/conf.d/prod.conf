# Редирект с HTTP на HTTPS
server {
    listen 80;  # Порт HTTP
    server_name daystream.ru;  # ЗАМЕНИТЬ на ваш реальный домен
    return 301 https://$server_name$request_uri;  # Постоянный редирект на HTTPS
}

# Production - HTTPS с редиректом с HTTP
server {
    listen 443 ssl http2;  # Порт HTTPS с поддержкой HTTP/2 для производительности
    server_name daystream.ru;  # ЗАМЕНИТЬ на реальный домен

    client_max_body_size 50m;  # максимальный размер тела запроса (загрузка файлов); не 10k из учебного примера
    client_body_timeout 120s;  # сколько ждать приёма тела запроса от клиента (большие загрузки)

    open_file_cache max=2000 inactive=20s min_uses=2 valid=60s;  # кэш метаданных файлов на диске: до 2000 записей, выброс неиспользуемых через 20s, валидность 60s
    open_file_cache_errors on;  # кэшировать факт отсутствия файла — меньше повторных syscalls при 404

    # SSL сертификаты (нужно получить от Let's Encrypt или другого CA)
    ssl_certificate /etc/nginx/ssl/cert.pem;  # Публичный сертификат (лучше fullchain)
    ssl_certificate_key /etc/nginx/ssl/key.pem;  # Приватный ключ

    # Настройки SSL протоколов и шифров для безопасности
    ssl_protocols TLSv1.2 TLSv1.3;  # Только современные протоколы
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES128-GCM-SHA256;  # Надежные шифры
    ssl_prefer_server_ciphers off;  # Позволить клиенту выбирать шифр
    ssl_session_cache shared:SSL:50m;  # размер разделяемого кэша TLS-сессий (меньше полных рукопожатий при повторных визитах)
    ssl_session_timeout 1d;  # как долго сервер помнит session ticket/id в кэше (здесь — до суток)
    ssl_session_tickets off;  # отключить TLS session tickets (жёстче для форензики и предсказуемее с точки зрения политики)

    # OCSP stapling: прикреплять к ответу «свежесть» сертификата (меньше задержек у клиента, чем запрос к OCSP)
    ssl_trusted_certificate /etc/nginx/ssl/cert.pem;  # цепочка до доверенного CA для проверки ответа OCSP-responder (нужен fullchain в cert.pem или отдельный chain-файл)
    resolver 127.0.0.11 valid=300s ipv6=off;  # DNS в Docker: встроенный резолвер; valid=300s — кэшировать IP OCSP на 300s; ipv6=off — не ждать AAAA если не нужно
    resolver_timeout 5s;  # таймаут на один DNS-запрос при stapling
    ssl_stapling on;  # включить stapling для этого server
    ssl_stapling_verify on;  # проверять подпись OCSP-ответа (без доверенной цепи stapling может не заработать)

    # Security headers для браузера (дополнительная защита)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;  # HSTS - заставляет браузер использовать только HTTPS
    add_header X-Frame-Options "DENY" always;  # Защита от clickjacking (запрещает embedding в iframe)
    add_header X-Content-Type-Options "nosniff" always;  # Защита от MIME-атак
    add_header X-XSS-Protection "1; mode=block" always;  # Включить XSS фильтр браузера
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;  # Политика рефереров
    add_header X-Permitted-Cross-Domain-Policies "none" always;  # не отдавать cross-domain policy для Flash/PDF и т.п. (минимум утечек)
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;  # отключить чувствительные API в браузере для этого origin (политика по умолчанию жёсткая)

    proxy_http_version 1.1;  # HTTP/1.1 к upstream — нужно для keep-alive к бэкенду и корректных заголовков
    proxy_hide_header X-Powered-By;  # убрать из ответа клиенту служебный заголовок фреймворка (меньше раскрытия стека)

    # Мониторинг: только с loopback внутри контейнера (docker exec curl)
    location = /nginx_stub_status {
        stub_status;  # краткая статистика nginx (активные соединения, запросы)
        access_log off;  # не засорять access-лог запросами к метрикам
        allow 127.0.0.1;  # разрешить только IPv4 loopback
        allow ::1;  # разрешить только IPv6 loopback
        deny all;  # всё остальное — 403
    }

    # Проксирование на frontend Django приложение
    location / {
        limit_req zone=req_limit_per_ip burst=40 nodelay;  # не более ~20 r/s в среднем; до 40 сверх лимита сразу (nodelay), иначе 503
        limit_conn conn_limit_per_ip 30;  # не больше 30 параллельных соединений с одного IP на этот location

        proxy_pass http://front:8000;  # Передача запросов на frontend контейнер
        proxy_set_header Host $http_host;  # Критически важно для редиректов (содержит домен с портом)
        proxy_set_header X-Real-IP $remote_addr;  # Реальный IP клиента
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Цепочка прокси
        proxy_set_header X-Forwarded-Proto https;  # Важно: https для Django security
        proxy_set_header X-Forwarded-Host $http_host;  # Важно: для правильных URL в редиректах
        proxy_set_header X-Forwarded-Port 443;  # Важно: 443 для правильных URL
        proxy_connect_timeout 10s;  # таймаут установки TCP к upstream
        proxy_send_timeout 120s;  # таймаут передачи запроса к upstream (в т.ч. большое тело)
        proxy_read_timeout 120s;  # таймаут ожидания ответа от upstream (долгие операции/загрузки)
    }

    # Проксирование на authserver API (аутентификация)
    location /auth/ {
        limit_req zone=auth_limit burst=10 nodelay;  # зона auth_limit: 5 r/s, burst 10 — усложняет brute-force
        limit_conn conn_limit_per_ip 20;  # чуть ниже параллелизм, чем у общего фронта

        proxy_pass http://authserver:8000;  # Передача запросов на authserver контейнер
        proxy_set_header Host $host;  # Достаточно $host (нет генерации абсолютных URL)
        proxy_set_header X-Real-IP $remote_addr;  # Реальный IP клиента
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Цепочка прокси
        proxy_set_header X-Forwarded-Proto https;  # Важно: https для Django security
        proxy_set_header X-Forwarded-Host $host;  # Достаточно $host для API
        proxy_set_header X-Forwarded-Port 443;  # Важно: 443 для правильных URL
        proxy_connect_timeout 10s;  # см. location / — таймаут подключения к authserver
        proxy_send_timeout 60s;  # для auth обычно не нужны 120s на тело ответа
        proxy_read_timeout 60s;  # ожидание ответа auth (логин/токены обычно быстрее API)
    }

    # Проксирование на backend API (основная логика)
    location /api/ {
        limit_req zone=req_limit_per_ip burst=60 nodelay;  # API часто шлёт пачку запросов — burst выше, чем у /
        limit_conn conn_limit_per_ip 30;

        proxy_pass http://back:8000;  # Передача запросов на backend контейнер
        proxy_set_header Host $http_host;  # Критически важно для генерации URL медиафайлов
        proxy_set_header X-Real-IP $remote_addr;  # Реальный IP клиента
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Цепочка прокси
        proxy_set_header X-Forwarded-Proto https;  # Важно: https для Django security
        proxy_set_header X-Forwarded-Host $http_host;  # Критически важно для генерации ссылок на картинки
        proxy_set_header X-Forwarded-Port 443;  # Важно: 443 для правильных URL
        proxy_connect_timeout 10s;  # таймаут подключения к back
        proxy_send_timeout 120s;  # тяжёлые POST/загрузки к API
        proxy_read_timeout 120s;  # долгие ответы бэкенда (отчёты, большие JSON)
    }

    # Статические файлы Django (CSS, JS, изображения)
    location /static/ {
        alias /var/www/static/;  # Путь к статическим файлам в контейнере
        expires 30d;  # задаёт Cache-Control / Expires; без add_header — наследуются security headers из server
        access_log off;  # много мелких запросов к статике — не раздувать access-лог
    }

    # Медиа файлы пользователей (загруженные изображения, документы)
    location /media/ {
        alias /var/www/media/;  # Путь к медиа файлам в контейнере
        expires 7d;  # короче, чем у static: пользовательский контент может чаще меняться
    }
}
